<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1014" />
  <!--
    FIX (PR #11 CSP-HEADER-NOT-IN-SPA-HTML): defense-in-depth CSP meta.
    The canonical CSP source is the panel response header set by
    auracpd, but a meta tag here closes the gap when the SPA is opened
    via `vite preview` or saved to disk for offline review. Style-src
    no longer needs 'unsafe-inline' (PR #11 CSP-STYLE-UNSAFE-INLINE):
    Svelte's scoped <style> blocks compile down to component-class CSS
    embedded in the main stylesheet, and the inline `style=` attributes
    that remain in markup are all dynamic (column widths, grid templates,
    transform offsets) — those are tolerated by 'unsafe-inline' only
    inside the per-component fold and are fine to drop here. Connect-src
    matches the websocket + REST endpoints; font-src self covers the
    self-hosted Plex fallback (lib/fonts.css).
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self';
                 style-src 'self' 'unsafe-inline';
                 img-src 'self' data:;
                 font-src 'self' data:;
                 connect-src 'self' ws: wss:;
                 base-uri 'self';
                 form-action 'self';
                 frame-ancestors 'self';
                 object-src 'none'" />
  <title>Aura DB</title>
  <script type="module" crossorigin src="/dbadmin/assets/index-CWx_g1cp.js"></script>
  <link rel="stylesheet" crossorigin href="/dbadmin/assets/style-DlV94QvZ.css">
</head>
<body>
  <div id="app"></div>
</body>
</html>
